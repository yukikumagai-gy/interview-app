<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>採用管理システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --c1:#4CAF50;--c1d:#388E3C;--c1l:#E8F5E9;--c1ll:#F1F8F1;
  --c2:#ffffff;--bg:#F4F6F4;--surf:#ffffff;--surf2:#F0F4F0;
  --bd:#DCE5DC;--bd2:#C5D4C5;
  --tx:#1C2B1C;--tx2:#4A6045;--tx3:#7A9B7A;
  --red:#D32F2F;--red-bg:#FFEBEE;--red-tx:#B71C1C;
  --amber:#F57C00;--amber-bg:#FFF3E0;--amber-tx:#E65100;
  --blue:#1565C0;--blue-bg:#E3F2FD;--blue-tx:#0D47A1;
  --teal:#00695C;--teal-bg:#E0F2F1;--teal-tx:#004D40;
  --r:10px;--rs:6px;--sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);--shm:0 4px 20px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;min-height:100vh}

/* Layout */
.wrap{display:flex;min-height:100vh}
.side{width:220px;background:var(--surf);border-right:1px solid var(--bd);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:20}
.side-logo{padding:18px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--c1);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{color:#fff}
.logo-name{font-size:14px;font-weight:600;color:var(--tx);letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--tx3)}
.side-nav{padding:10px 8px;flex:1;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;padding:10px 10px 4px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;color:var(--tx2);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px;user-select:none}
.nav-item:hover{background:var(--c1l);color:var(--c1d)}
.nav-item.active{background:var(--c1);color:#fff}
.nav-item.active svg{opacity:1}
.nav-item svg{opacity:.6;flex-shrink:0}
.side-foot{padding:14px 16px;border-top:1px solid var(--bd);font-size:11px;color:var(--tx3)}
.main{margin-left:220px;flex:1;min-width:0}
.topbar{background:var(--surf);border-bottom:1px solid var(--bd);height:54px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-title{font-size:15px;font-weight:600;color:var(--tx)}
.topbar-right{display:flex;align-items:center;gap:8px}
.content{padding:22px 24px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);border:1px solid var(--bd2);background:var(--surf);color:var(--tx);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;text-decoration:none;white-space:nowrap}
.btn:hover{background:var(--surf2)}
.btn-primary{background:var(--c1);border-color:var(--c1);color:#fff}
.btn-primary:hover{background:var(--c1d);border-color:var(--c1d)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{color:var(--red);border-color:#FFCDD2}
.btn-danger:hover{background:var(--red-bg)}
.btn-ghost{border-color:transparent;background:transparent}
.btn-ghost:hover{background:var(--surf2);border-color:var(--bd)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px}
.stat{background:var(--surf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.stat-label{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.stat-val{font-size:26px;font-weight:600;letter-spacing:-.5px;line-height:1}
.stat-sub{font-size:11px;color:var(--tx3);margin-top:3px}
.stat-pct{font-size:11px;font-weight:600;padding:1px 6px;border-radius:3px;margin-left:6px}

/* Funnel */
.funnel-wrap{background:var(--surf);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;margin-bottom:22px;box-shadow:var(--sh)}
.funnel-title{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--tx)}
.funnel-steps{display:flex;align-items:stretch;gap:0}
.funnel-step{flex:1;min-width:0}
.funnel-bar-wrap{display:flex;align-items:center;gap:0}
.funnel-block{flex:1;padding:12px 8px;text-align:center;border-radius:0;transition:all .2s;cursor:default}
.funnel-block:first-child{border-radius:8px 0 0 8px}
.funnel-arrow{width:20px;display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:10px;flex-shrink:0}
.funnel-num{font-size:20px;font-weight:700;line-height:1}
.funnel-lbl{font-size:10px;font-weight:600;margin-top:3px;opacity:.85}
.funnel-pct{font-size:10px;margin-top:1px;opacity:.7}
.fb-apply{background:#E8F5E9;color:#1B5E20}
.fb-done{background:#E3F2FD;color:#0D47A1}
.fb-no-contact{background:#FFF8E1;color:#F57F17}
.fb-decline{background:#FFEBEE;color:#B71C1C}
.fb-offer{background:#E0F2F1;color:#004D40}
.fb-accept{background:#F3E5F5;color:#4A148C}

/* Table */
.tcard{background:var(--surf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.srch{position:relative;flex:1;min-width:180px}
.srch svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none}
.srch input{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--surf);color:var(--tx);font-size:13px;font-family:inherit}
.srch input:focus{outline:none;border-color:var(--c1)}
select.flt{padding:7px 10px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--surf);color:var(--tx);font-size:13px;font-family:inherit;cursor:pointer}
select.flt:focus{outline:none}
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;background:var(--surf2);border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--bd);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFCFA}
.av{width:30px;height:30px;border-radius:50%;background:var(--c1l);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--c1d);flex-shrink:0}
.nm{display:flex;align-items:center;gap:9px}
.nm-name{font-weight:500}
.nm-sub{font-size:11px;color:var(--tx3)}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-done{background:var(--blue-bg);color:var(--blue-tx)}
.b-nodone{background:var(--amber-bg);color:var(--amber-tx)}
.b-decline{background:var(--red-bg);color:var(--red-tx)}
.b-hire{background:var(--teal-bg);color:var(--teal-tx)}
.b-nohire{background:var(--red-bg);color:var(--red-tx)}
.b-consult{background:#EDE7F6;color:#4527A0}
.b-accept{background:#E8F5E9;color:#1B5E20}
.b-wait{background:var(--amber-bg);color:var(--amber-tx)}
.b-offdecline{background:var(--red-bg);color:var(--red-tx)}
.b-nocontact{background:#F5F5F5;color:#424242}
.empty{text-align:center;padding:36px;color:var(--tx3);font-size:13px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:var(--surf);border-radius:14px;border:1px solid var(--bd);box-shadow:var(--shm);width:100%;max-width:780px;margin:auto}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surf);z-index:1;border-radius:14px 14px 0 0}
.modal-title{font-size:15px;font-weight:600}
.modal-close{width:28px;height:28px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:var(--tx3);font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--surf2)}
.modal-body{padding:18px 20px}
.modal-foot{padding:12px 20px;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:flex-end;gap:8px}
.sec-title{font-size:12px;font-weight:600;color:var(--c1d);text-transform:uppercase;letter-spacing:.5px;padding:0 0 8px;border-bottom:1px solid var(--c1l);margin-bottom:14px;margin-top:20px}
.sec-title:first-child{margin-top:0}
.frow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.frow2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:12px}
.frow1{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg select,.fg textarea{padding:7px 10px;border:1px solid var(--bd);border-radius:var(--rs);background:#FAFCFA;color:var(--tx);font-size:13px;font-family:inherit;width:100%;transition:border .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--c1);background:var(--surf)}
.fg textarea{resize:vertical}
.check-group{display:flex;flex-wrap:wrap;gap:8px;padding:6px 0}
.chk-item{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer}
.chk-item input[type=checkbox]{accent-color:var(--c1);width:14px;height:14px}
.note-small{font-size:11px;color:var(--tx3);margin-top:3px}

/* Agent page */
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.agent-card{background:var(--surf);border:1px solid var(--bd);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}
.agent-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.agent-name{font-size:14px;font-weight:600}
.agent-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.ast{text-align:center;padding:8px 4px;background:var(--surf2);border-radius:var(--rs)}
.ast-v{font-size:18px;font-weight:700;color:var(--tx)}
.ast-l{font-size:10px;color:var(--tx3);margin-top:1px}

/* Dashboard charts */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-card{background:var(--surf);border:1px solid var(--bd);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}
.chart-title{font-size:13px;font-weight:600;margin-bottom:14px}
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:12px;color:var(--tx2);width:80px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:20px;background:var(--surf2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease;display:flex;align-items:center;padding-left:6px}
.bar-val{font-size:10px;font-weight:600;color:#fff;white-space:nowrap}
.bar-num{font-size:12px;color:var(--tx2);width:30px;flex-shrink:0}
.pie-wrap{display:flex;align-items:center;gap:20px}
.pie-svg{flex-shrink:0}
.pie-legend{display:flex;flex-direction:column;gap:6px}
.pie-item{display:flex;align-items:center;gap:6px;font-size:12px}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Views */
.view{display:none}.view.on{display:block}
</style>
</head>
<body>
<div class="wrap">
<aside class="side">
  <div class="side-logo">
    <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
    <div><div class="logo-name">RecruitOS</div><div class="logo-sub">採用管理システム</div></div>
  </div>
  <nav class="side-nav">
    <div class="nav-section">メニュー</div>
    <div class="nav-item active" onclick="nav('dashboard',this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>ダッシュボード
    </div>
    <div class="nav-item" onclick="nav('booking',this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>予約
    </div>
    <div class="nav-item" onclick="nav('candidates',this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>応募者管理
    </div>
    <div class="nav-item" onclick="nav('agents',this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>エージェント
    </div>
    <div class="nav-item" onclick="nav('calendar',this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>カレンダー
    </div>
  </nav>
  <div class="side-foot">RecruitOS v2.0</div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">ダッシュボード</div>
    <div class="topbar-right">
      <button class="btn btn-primary" id="add-btn" onclick="openAdd()" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>新規追加
      </button>
    </div>
  </div>
  <div class="content">

    <!-- DASHBOARD -->
    <div class="view on" id="view-dashboard">
      <div class="stats" id="dash-stats"></div>
      <div class="funnel-wrap">
        <div class="funnel-title">採用ファネル（今月）</div>
        <div id="funnel"></div>
      </div>
      <div class="dash-grid">
        <div class="chart-card">
          <div class="chart-title">流入経路別 応募数</div>
          <div class="bar-chart" id="chart-source"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">エージェント別 実績</div>
          <div class="bar-chart" id="chart-agent"></div>
        </div>
      </div>
    </div>

    <!-- BOOKING -->
    <div class="view" id="view-booking">
      <div class="toolbar">
        <div class="srch"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="bk-search" placeholder="氏名・ポジションで検索..." oninput="renderBooking()"></div>
        <select class="flt" id="bk-status" onchange="renderBooking()">
          <option value="">すべてのステータス</option>
          <option value="pending">調整中</option>
          <option value="confirmed">確定</option>
          <option value="completed">完了</option>
          <option value="cancelled">キャンセル</option>
        </select>
        <select class="flt" id="bk-round" onchange="renderBooking()">
          <option value="">すべての選考</option>
          <option value="1次面接">1次面接</option>
          <option value="2次面接">2次面接</option>
          <option value="最終面接">最終面接</option>
          <option value="カジュアル面談">カジュアル面談</option>
        </select>
      </div>
      <div class="tcard"><table><thead><tr>
        <th>候補者</th><th>選考</th><th>日時</th><th>面接官</th><th>場所</th><th>ステータス</th><th></th>
      </tr></thead><tbody id="bk-body"></tbody></table></div>
      <div class="empty" id="bk-empty" style="display:none">該当する予約がありません</div>
    </div>

    <!-- CANDIDATES -->
    <div class="view" id="view-candidates">
      <div class="toolbar">
        <div class="srch"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="cd-search" placeholder="氏名・流入経路で検索..." oninput="renderCandidates()"></div>
        <select class="flt" id="cd-interview" onchange="renderCandidates()">
          <option value="">面接の着地</option>
          <option value="実施">実施</option>
          <option value="応募辞退">応募辞退</option>
          <option value="未接触">未接触</option>
        </select>
        <select class="flt" id="cd-status" onchange="renderCandidates()">
          <option value="">面接後ステータス</option>
          <option value="営業相談中">営業相談中</option>
          <option value="採用">採用</option>
          <option value="不採用">不採用</option>
        </select>
        <select class="flt" id="cd-offer" onchange="renderCandidates()">
          <option value="">内定後ステータス</option>
          <option value="承諾待ち">承諾待ち</option>
          <option value="内定辞退">内定辞退</option>
          <option value="内定承諾">内定承諾</option>
        </select>
      </div>
      <div class="tcard"><table><thead><tr>
        <th>氏名</th><th>応募日</th><th>流入経路</th><th>面接の着地</th><th>面接後</th><th>内定後</th><th>入社日</th><th></th>
      </tr></thead><tbody id="cd-body"></tbody></table></div>
      <div class="empty" id="cd-empty" style="display:none">該当する応募者がいません</div>
    </div>

    <!-- AGENTS -->
    <div class="view" id="view-agents">
      <div class="toolbar">
        <div class="srch"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="ag-search" placeholder="エージェント名で検索..." oninput="renderAgents()"></div>
      </div>
      <div class="agent-grid" id="ag-grid"></div>
      <div class="empty" id="ag-empty" style="display:none">エージェントがいません</div>
    </div>

    <!-- CALENDAR -->
    <div class="view" id="view-calendar">
      <div style="background:var(--surf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--surf2)">
          <div style="font-size:15px;font-weight:600" id="cal-title"></div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm" onclick="calMov(-1)">←</button>
            <button class="btn btn-sm" onclick="calMov(0)">今月</button>
            <button class="btn btn-sm" onclick="calMov(1)">→</button>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr)" id="cal-dows"></div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr)" id="cal-days"></div>
      </div>
    </div>

  </div>
</div>
</div>

<!-- BOOKING MODAL -->
<div class="modal-bg" id="bk-modal">
<div class="modal">
  <div class="modal-head">
    <div class="modal-title" id="bk-modal-title">面接予約</div>
    <button class="modal-close" onclick="closeModal('bk-modal')">✕</button>
  </div>
  <div class="modal-body">
    <input type="hidden" id="bk-id">
    <div class="sec-title">基本情報</div>

/* ---- NAV ---- */
const pageTitles={dashboard:'ダッシュボード',booking:'予約',candidates:'応募者管理',agents:'エージェント',calendar:'カレンダー'};
function nav(page,el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('view-'+page).classList.add('on');
  document.getElementById('page-title').textContent=pageTitles[page];
  const addBtn=document.getElementById('add-btn');
  addBtn.style.display=['booking','candidates','agents'].includes(page)?'':'none';
  if(page==='booking')renderBooking();
  if(page==='candidates')renderCandidates();
  if(page==='agents')renderAgents();
  if(page==='dashboard')renderDashboard();
  if(page==='calendar')renderCalendar();
}
function openAdd(){
  const page=document.querySelector('.nav-item.active').textContent.trim();
  if(page==='予約')openBkModal();
  if(page==='応募者管理')openCdModal();
  if(page==='エージェント')openAgModal();
}

/* ---- MODAL ---- */
function closeModal(id){document.getElementById(id).style.display='none';}
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',function(e){if(e.target===this)this.style.display='none';}));

/* ====== DASHBOARD ====== */
function renderDashboard(){
  const cd=DB.candidates;
  const total=cd.length;
  const done=cd.filter(c=>c.interviewResult==='実施').length;
  const noContact=cd.filter(c=>c.interviewResult==='未接触').length;
  const decline=cd.filter(c=>c.interviewResult==='応募辞退').length;
  const offer=cd.filter(c=>c.afterStatus==='採用').length;
  const accept=cd.filter(c=>c.offerStatus==='内定承諾').length;
  const pct=(n,d)=>d?Math.round(n/d*100)+'%':'—';
  const fee=cd.reduce((s,c)=>s+(parseInt(c.fee)||0),0);

  document.getElementById('dash-stats').innerHTML=`
    <div class="stat"><div class="stat-label">月間応募数</div><div class="stat-val">${total}</div><div class="stat-sub">全応募者</div></div>
    <div class="stat"><div class="stat-label">面接実施</div><div class="stat-val" style="color:var(--blue)">${done}<span class="stat-pct" style="background:var(--blue-bg);color:var(--blue-tx)">${pct(done,total)}</span></div><div class="stat-sub">応募数比</div></div>
    <div class="stat"><div class="stat-label">未接触</div><div class="stat-val" style="color:var(--amber)">${noContact}<span class="stat-pct" style="background:var(--amber-bg);color:var(--amber-tx)">${pct(noContact,total)}</span></div><div class="stat-sub">応募数比</div></div>
    <div class="stat"><div class="stat-label">辞退</div><div class="stat-val" style="color:var(--red)">${decline}<span class="stat-pct" style="background:var(--red-bg);color:var(--red-tx)">${pct(decline,total)}</span></div><div class="stat-sub">応募数比</div></div>
    <div class="stat"><div class="stat-label">内定数</div><div class="stat-val" style="color:var(--teal)">${offer}<span class="stat-pct" style="background:var(--teal-bg);color:var(--teal-tx)">${pct(offer,done)}</span></div><div class="stat-sub">面接実施比</div></div>
    <div class="stat"><div class="stat-label">承諾数</div><div class="stat-val" style="color:#4527A0">${accept}<span class="stat-pct" style="background:#EDE7F6;color:#4527A0">${pct(accept,offer)}</span></div><div class="stat-sub">内定数比</div></div>
    <div class="stat"><div class="stat-label">紹介料合計</div><div class="stat-val" style="font-size:18px">¥${fee.toLocaleString()}</div><div class="stat-sub">承諾者合計</div></div>
  `;

  // Funnel
  const steps=[
    {label:'応募',n:total,cls:'fb-apply'},
    {label:'面接実施',n:done,cls:'fb-done'},
    {label:'未接触',n:noContact,cls:'fb-no-contact'},
    {label:'辞退',n:decline,cls:'fb-decline'},
    {label:'内定',n:offer,cls:'fb-offer'},
    {label:'承諾',n:accept,cls:'fb-accept'},
  ];
  let fhtml='<div style="display:flex;align-items:stretch;gap:0">';
  steps.forEach((s,i)=>{
    if(i>0)fhtml+=`<div style="width:18px;display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:12px;flex-shrink:0">▶</div>`;
    const p=total?Math.round(s.n/total*100):0;
    fhtml+=`<div class="funnel-block ${s.cls}" style="flex:1;border-radius:${i===0?'8px 0 0 8px':i===steps.length-1?'0 8px 8px 0':'0'}">
      <div class="funnel-num">${s.n}</div>
      <div class="funnel-lbl">${s.label}</div>
      <div class="funnel-pct">${total?p+'%':'—'}</div>
    </div>`;
  });
  fhtml+='</div>';
  document.getElementById('funnel').innerHTML=fhtml;

  // Source chart
  const sources={};
  cd.forEach(c=>{if(c.source)sources[c.source]=(sources[c.source]||0)+1;});
  const maxS=Math.max(...Object.values(sources),1);
  const colors=['#4CAF50','#2196F3','#FF9800','#9C27B0','#F44336','#00BCD4','#795548','#607D8B'];
  document.getElementById('chart-source').innerHTML=Object.entries(sources).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k,v],i)=>
    `<div class="bar-row"><div class="bar-label">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxS*100)}%;background:${colors[i%colors.length]}"><span class="bar-val">${v}人</span></div></div></div>`
  ).join('')||'<div style="color:var(--tx3);font-size:12px">データなし</div>';

  // Agent chart
  const agents={};
  cd.forEach(c=>{if(c.agent)agents[c.agent]=(agents[c.agent]||0)+1;});
  const maxA=Math.max(...Object.values(agents),1);
  document.getElementById('chart-agent').innerHTML=Object.entries(agents).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k,v],i)=>
    `<div class="bar-row"><div class="bar-label">${k.length>8?k.slice(0,7)+'…':k}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxA*100)}%;background:${colors[i%colors.length]}"><span class="bar-val">${v}人</span></div></div></div>`
  ).join('')||'<div style="color:var(--tx3);font-size:12px">データなし</div>';
}

function buildGcal(b){
  if(!b.date||!b.time)return null;
  const[yr,mo,dy]=b.date.split('-').map(Number);
  const[h,mi]=b.time.split(':').map(Number);
  const dur=b.duration||60;
  const s=new Date(yr,mo-1,dy,h,mi),e=new Date(s.getTime()+dur*60000);
  const fmt=d=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  return`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(`【面接】${b.name}（${b.round}）`)}&dates=${fmt(s)}/${fmt(e)}&details=${encodeURIComponent(`ポジション：${b.position||''}\n面接官：${b.interviewer||''}\nメモ：${b.memo||''}`)}&location=${encodeURIComponent(b.location||'')}`;
}

/* ====== CALENDAR ====== */
function renderCalendar(){
  const now=new Date();
  if(!calY){calY=now.getFullYear();calM=now.getMonth();}
  document.getElementById('cal-title').textContent=`${calY}年 ${calM+1}月`;
  document.getElementById('cal-dows').innerHTML=['日','月','火','水','木','金','土'].map(d=>`<div style="padding:7px 4px;text-align:center;font-size:11px;font-weight:600;color:var(--tx3);border-bottom:1px solid var(--bd);text-transform:uppercase">${d}</div>`).join('');
  const first=new Date(calY,calM,1),last=new Date(calY,calM+1,0);
  const p=n=>String(n).padStart(2,'0');
  const mBk=DB.bookings.filter(b=>{if(!b.date)return false;const d=new Date(b.date);return d.getFullYear()===calY&&d.getMonth()===calM;});
  const bkEvc={confirmed:'#C8E6C9',pending:'#FFF9C4',cancelled:'#FFCDD2',completed:'#BBDEFB'};
  const bkEvt={confirmed:'#1B5E20',pending:'#F57F17',cancelled:'#B71C1C',completed:'#0D47A1'};
  let cells=[];
  const pl=new Date(calY,calM,0).getDate();
  for(let i=0;i<first.getDay();i++)cells.push({day:pl-first.getDay()+i+1,cur:false});
  for(let i=1;i<=last.getDate();i++)cells.push({day:i,cur:true});
  while(cells.length%7)cells.push({day:cells.length-last.getDate()-first.getDay()+1,cur:false});
  const dEl=document.getElementById('cal-days');dEl.innerHTML='';
  cells.forEach(c=>{
    const div=document.createElement('div');
    div.style.cssText='min-height:76px;padding:5px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s';
    div.onmouseenter=()=>div.style.background='var(--c1ll)';
    div.onmouseleave=()=>div.style.background='';
    if(!c.cur)div.style.opacity='.4';
    const isToday=c.cur&&c.day===now.getDate()&&calM===now.getMonth()&&calY===now.getFullYear();
    const ds=c.cur?`${calY}-${p(calM+1)}-${p(c.day)}`:null;
    const evs=ds?mBk.filter(b=>b.date===ds):[];
    const dnStyle=isToday?'width:20px;height:20px;background:var(--c1);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;':'';
    div.innerHTML=`<div style="font-size:12px;font-weight:600;margin-bottom:2px${isToday?';display:inline-flex;':''}" ${isToday?`style="${dnStyle}"`:''}>${c.day}</div>`+evs.map(b=>`<div style="font-size:10px;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;background:${bkEvc[b.status]};color:${bkEvt[b.status]};cursor:pointer" onclick="openBkModal(${b.id});event.stopPropagation()">${b.time} ${b.name}</div>`).join('');
    if(c.cur)div.addEventListener('click',()=>openBkModal(null,ds));
    dEl.appendChild(div);
  });
}
function calMov(d){
  if(d===0){const n=new Date();calY=n.getFullYear();calM=n.getMonth();}
  else{calM+=d;if(calM>11){calM=0;calY++;}else if(calM<0){calM=11;calY--;}}
  renderCalendar();
}
